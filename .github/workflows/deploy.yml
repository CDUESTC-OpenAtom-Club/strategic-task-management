# 前端自动部署到生产服务器
# 仓库: CDUESTC-OpenAtom-Club/strategic-task-management

name: Deploy Frontend

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '25'

jobs:
  build-and-deploy:
    name: Build and Deploy Frontend
    runs-on: [self-hosted, linux]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          clean: true
          fetch-depth: 1

      - name: Fix permissions
        run: |
          sudo chown -R $(whoami):$(whoami) . || true
          chmod -R u+rwX . || true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Free up memory for build
        run: |
          # Stop memory-intensive services during build
          sudo systemctl stop n8n || true
          sudo systemctl stop sism-backend || true
          # Clear page cache to free memory
          sync && sudo sysctl -w vm.drop_caches=3 2>/dev/null || true
          echo "Memory freed for build"
          free -h

      - name: Install dependencies
        run: npm ci

      - name: Verify architecture debt baseline
        run: npm run arch:check

      - name: Build for production
        run: npm run build
        env:
          VITE_API_BASE_URL: /api/v1
          VITE_USE_MOCK: false
          VITE_ENABLE_DEVTOOLS: false
          VITE_LOG_LEVEL: warn

      - name: Restart services
        run: |
          sudo systemctl start sism-backend || true
          sudo systemctl start n8n || true
          echo "Services restarted"

      - name: Stop nginx
        run: sudo systemctl stop nginx || true

      - name: Backup current version
        run: |
          if [ -d /var/www/sism ]; then
            sudo mv /var/www/sism /var/www/sism.backup.$(date +%Y%m%d_%H%M%S)
          fi
          sudo mkdir -p /var/www/sism

      - name: Deploy to nginx directory
        run: |
          sudo cp -r dist/* /var/www/sism/
          sudo chown -R www:www /var/www/sism
          sudo chmod -R 755 /var/www/sism

      - name: Start nginx
        run: sudo systemctl start nginx

      - name: Health check
        run: |
          echo "Waiting for deployment..."
          sleep 5

          for i in 1 2 3 4 5; do
            if curl -sf https://blackevil.cn > /dev/null 2>&1; then
              echo "Frontend is accessible"
              exit 0
            fi
            echo "Retry $i/5..."
            sleep 5
          done

          echo "Health check failed"
          exit 1

      - name: Cleanup old backups
        run: |
          cd /var/www
          ls -t sism.backup.* 2>/dev/null | tail -n +4 | xargs -r sudo rm -rf || true
          echo "Cleanup completed"
