name: Build and Push Frontend Image

on:
  push:
    branches: [main, codex/docker-image-test]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: frontend-image-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: '24'

jobs:
  qa:
    name: QA
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install test prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep

      - name: Checkout backend OpenAPI baseline
        run: |
          rm -rf ../sism-backend
          git clone --depth 1 https://github.com/CDUESTC-OpenAtom-Club/sism-backend.git ../sism-backend

      - name: Verify architecture baseline
        run: npm run arch:check

      - name: Run type check
        run: npm run type-check

      - name: Run unit tests
        run: npm test

      - name: Build production bundle
        run: npm run build
        env:
          VITE_API_BASE_URL: /api/v1
          VITE_USE_MOCK: false
          VITE_ENABLE_DEVTOOLS: false
          VITE_LOG_LEVEL: warn

  build-and-push:
    name: Build and Push
    needs: qa
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Normalize image name
        id: image
        run: |
          OWNER="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "image=ghcr.io/${OWNER}/strategic-task-management" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.image }}:${{ github.sha }}
            ${{ steps.image.outputs.image }}:main
          build-args: |
            VITE_API_BASE_URL=/api/v1
            VITE_USE_MOCK=false
            VITE_ENABLE_DEVTOOLS=false
            VITE_LOG_LEVEL=warn
